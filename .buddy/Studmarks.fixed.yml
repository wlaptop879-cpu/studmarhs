- pipeline: studmarks
  name: Studmarks
  refs:
  - refs/heads/main
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  actions:
  - action: npm test
    type: BUILD
    ignore_errors: true
    execute_commands:
    - npm install -g yarn
    - yarn install
    - ""
    execute_every_command: true
    docker_image_name: library/node
    docker_image_tag: 24
